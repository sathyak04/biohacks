services:
  - type: web
    name: mutationmap
    runtime: node
    buildCommand: |
      cd frontend && npm install && npm run build &&
      cd ../backend && npm install &&
      pip install -r python/requirements.txt &&
      python python/generate_data.py
    startCommand: cd backend && node server.js
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
